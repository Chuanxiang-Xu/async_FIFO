<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Async FIFO core and wrapper architecture</title>
  <desc id="desc">Public FIFO modules are organized as a minimal equal-width async FIFO, optional read/protocol/composition wrappers, and an experimental external RAM interface. The CDC mechanism remains pointer, synchronizer, status, and storage control logic.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b45309"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.4; rx: 10; }
      .wrapper { fill: #f0fdf4; stroke: #15803d; stroke-width: 1.3; rx: 10; }
      .ramif { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.3; rx: 10; }
      .core { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 1.6; rx: 12; }
      .sub { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.1; rx: 8; }
      .util { fill: #fef3c7; stroke: #b45309; stroke-width: 1.2; rx: 10; }
      .text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font-size: 13px; }
      .label { font-size: 15px; font-weight: 700; }
      .muted { fill: #475569; font-size: 12px; }
      .line { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrow-blue); }
      .dash { stroke: #b45309; stroke-width: 1.7; fill: none; stroke-dasharray: 6 5; marker-end: url(#arrow-amber); }
    </style>
  </defs>

  <rect class="bg" width="980" height="520"/>

  <rect class="box" x="38" y="44" width="220" height="56"/>
  <text class="text label" x="148" y="68" text-anchor="middle">async_fifo</text>
  <text class="text muted" x="148" y="88" text-anchor="middle">minimal equal-width entry</text>

  <rect class="wrapper" x="38" y="126" width="220" height="56"/>
  <text class="text label" x="148" y="150" text-anchor="middle">async_fifo_fwft</text>
  <text class="text muted" x="148" y="170" text-anchor="middle">read-side fallthrough wrapper</text>

  <rect class="wrapper" x="38" y="208" width="220" height="56"/>
  <text class="text label" x="148" y="232" text-anchor="middle">async_bidir_fifo</text>
  <text class="text muted" x="148" y="252" text-anchor="middle">two independent async_fifo paths</text>

  <rect class="ramif" x="38" y="290" width="220" height="56"/>
  <text class="text label" x="148" y="314" text-anchor="middle">async_fifo_ramif</text>
  <text class="text muted" x="148" y="334" text-anchor="middle">external RAM backend</text>

  <rect class="ramif" x="38" y="372" width="220" height="56"/>
  <text class="text label" x="148" y="396" text-anchor="middle">async_bidir_ramif_fifo</text>
  <text class="text muted" x="148" y="416" text-anchor="middle">two independent RAMIF paths</text>

  <rect class="wrapper" x="38" y="454" width="220" height="44"/>
  <text class="text label" x="148" y="481" text-anchor="middle">width_conv / stream</text>

  <rect class="core" x="360" y="58" width="570" height="250"/>
  <text class="text label" x="645" y="88" text-anchor="middle">async_fifo_core</text>
  <text class="text muted" x="645" y="108" text-anchor="middle">Cummings-style CDC mechanism</text>

  <rect class="sub" x="394" y="142" width="122" height="54"/>
  <text class="text small" x="455" y="165" text-anchor="middle">fifo_mem</text>
  <text class="text muted" x="455" y="183" text-anchor="middle">dual-clock RAM</text>

  <rect class="sub" x="536" y="142" width="122" height="54"/>
  <text class="text small" x="597" y="165" text-anchor="middle">wptr_full</text>
  <text class="text muted" x="597" y="183" text-anchor="middle">write status</text>

  <rect class="sub" x="678" y="142" width="122" height="54"/>
  <text class="text small" x="739" y="165" text-anchor="middle">rptr_empty</text>
  <text class="text muted" x="739" y="183" text-anchor="middle">read status</text>

  <rect class="sub" x="464" y="222" width="122" height="44"/>
  <text class="text small" x="525" y="248" text-anchor="middle">sync_w2r</text>

  <rect class="sub" x="606" y="222" width="122" height="44"/>
  <text class="text small" x="667" y="248" text-anchor="middle">sync_r2w</text>

  <rect class="ramif" x="360" y="340" width="255" height="76"/>
  <text class="text label" x="487" y="368" text-anchor="middle">RAMIF control path</text>
  <text class="text muted" x="487" y="389" text-anchor="middle">same pointers, flags, rd_valid</text>
  <text class="text muted" x="487" y="407" text-anchor="middle">caller supplies one-cycle RAM</text>

  <rect class="util" x="672" y="346" width="220" height="56"/>
  <text class="text label" x="782" y="370" text-anchor="middle">async_reset_sync</text>
  <text class="text muted" x="782" y="390" text-anchor="middle">optional local reset helper</text>

  <path class="line" d="M258,72 C296,72 318,84 360,95"/>
  <path class="line" d="M258,154 C306,154 326,126 360,113"/>
  <path class="line" d="M258,236 C316,236 330,178 360,158"/>
  <path class="line" d="M258,476 C318,476 327,268 360,242"/>

  <path class="line" d="M258,318 C302,318 320,350 360,371"/>
  <path class="line" d="M258,400 C304,400 322,392 360,386"/>

  <path class="dash" d="M672,374 C520,330 376,230 258,164"/>
  <path class="dash" d="M672,374 C526,390 396,420 258,476"/>

  <text class="text muted" x="645" y="464" text-anchor="middle">Only registered Gray pointers cross clock domains; payload stays in internal or caller-provided RAM.</text>
  <text class="text muted" x="645" y="486" text-anchor="middle">Bidirectional modules are conservative compositions of two independent one-way FIFOs.</text>
</svg>
