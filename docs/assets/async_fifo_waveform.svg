<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-labelledby="title desc">
  <title id="title">Async FIFO waveform snapshot</title>
  <desc id="desc">A representative waveform showing unrelated write and read clocks, accepted writes, delayed readable data, rd_en, rd_valid, and empty deassertion.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .grid { stroke: #1e293b; stroke-width: 1; }
      .axis { stroke: #475569; stroke-width: 1; }
      .wave { stroke: #38bdf8; stroke-width: 2.4; fill: none; stroke-linejoin: round; }
      .wave2 { stroke: #a78bfa; stroke-width: 2.4; fill: none; stroke-linejoin: round; }
      .data { stroke: #34d399; stroke-width: 2.2; fill: none; }
      .flag { stroke: #fbbf24; stroke-width: 2.2; fill: none; }
      .label { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; fill: #e2e8f0; }
      .note { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #cbd5e1; }
      .badge { fill: #064e3b; stroke: #10b981; stroke-width: 1; rx: 5; }
      .badgeText { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; fill: #d1fae5; }
    </style>
  </defs>
  <rect class="bg" width="920" height="360"/>

  <g>
    <line class="grid" x1="170" y1="28" x2="170" y2="320"/>
    <line class="grid" x1="230" y1="28" x2="230" y2="320"/>
    <line class="grid" x1="290" y1="28" x2="290" y2="320"/>
    <line class="grid" x1="350" y1="28" x2="350" y2="320"/>
    <line class="grid" x1="410" y1="28" x2="410" y2="320"/>
    <line class="grid" x1="470" y1="28" x2="470" y2="320"/>
    <line class="grid" x1="530" y1="28" x2="530" y2="320"/>
    <line class="grid" x1="590" y1="28" x2="590" y2="320"/>
    <line class="grid" x1="650" y1="28" x2="650" y2="320"/>
    <line class="grid" x1="710" y1="28" x2="710" y2="320"/>
    <line class="grid" x1="770" y1="28" x2="770" y2="320"/>
    <line class="grid" x1="830" y1="28" x2="830" y2="320"/>
  </g>

  <text class="label" x="38" y="60">wr_clk</text>
  <path class="wave" d="M150 64 L170 64 L170 40 L190 40 L190 64 L210 64 L210 40 L230 40 L230 64 L250 64 L250 40 L270 40 L270 64 L290 64 L290 40 L310 40 L310 64 L330 64 L330 40 L350 40 L350 64 L370 64 L370 40 L390 40 L390 64 L410 64 L410 40 L430 40 L430 64 L450 64 L450 40 L470 40 L470 64 L490 64 L490 40 L510 40 L510 64 L530 64 L530 40 L550 40 L550 64 L570 64 L570 40 L590 40 L590 64 L610 64 L610 40 L630 40 L630 64 L650 64 L650 40 L670 40 L670 64 L690 64 L690 40 L710 40 L710 64 L730 64 L730 40 L750 40 L750 64 L770 64 L770 40 L790 40 L790 64 L810 64 L810 40 L830 40 L830 64 L850 64"/>

  <text class="label" x="38" y="105">wr_en</text>
  <path class="data" d="M150 108 L210 108 L210 86 L270 86 L270 108 L330 108 L330 86 L390 86 L390 108 L850 108"/>
  <rect class="badge" x="218" y="72" width="42" height="20"/>
  <text class="badgeText" x="239" y="86" text-anchor="middle">A0</text>
  <rect class="badge" x="338" y="72" width="42" height="20"/>
  <text class="badgeText" x="359" y="86" text-anchor="middle">A1</text>

  <text class="label" x="38" y="150">full</text>
  <path class="flag" d="M150 152 L850 152"/>

  <text class="label" x="38" y="195">rd_clk</text>
  <path class="wave2" d="M150 198 L184 198 L184 174 L218 174 L218 198 L252 198 L252 174 L286 174 L286 198 L320 198 L320 174 L354 174 L354 198 L388 198 L388 174 L422 174 L422 198 L456 198 L456 174 L490 174 L490 198 L524 198 L524 174 L558 174 L558 198 L592 198 L592 174 L626 174 L626 198 L660 198 L660 174 L694 174 L694 198 L728 198 L728 174 L762 174 L762 198 L796 198 L796 174 L830 174 L830 198 L850 198"/>

  <text class="label" x="38" y="240">empty</text>
  <path class="flag" d="M150 218 L286 218 L286 240 L850 240"/>
  <text class="note" x="300" y="222">deasserts after Gray pointer sync latency</text>

  <text class="label" x="38" y="285">rd_en</text>
  <path class="data" d="M150 288 L490 288 L490 266 L558 266 L558 288 L626 288 L626 266 L694 266 L694 288 L850 288"/>

  <text class="label" x="38" y="330">rd_valid</text>
  <path class="data" d="M150 332 L524 332 L524 310 L592 310 L592 332 L660 332 L660 310 L728 310 L728 332 L850 332"/>
  <rect class="badge" x="533" y="296" width="42" height="20"/>
  <text class="badgeText" x="554" y="310" text-anchor="middle">A0</text>
  <rect class="badge" x="669" y="296" width="42" height="20"/>
  <text class="badgeText" x="690" y="310" text-anchor="middle">A1</text>

  <text class="note" x="150" y="24">Representative async FIFO timing: data is written in wr_clk, read later in rd_clk, and qualified by rd_valid.</text>
</svg>
