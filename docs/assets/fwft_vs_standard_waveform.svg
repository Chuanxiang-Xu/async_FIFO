<svg xmlns="http://www.w3.org/2000/svg" width="980" height="470" viewBox="0 0 980 470" role="img" aria-labelledby="title desc">
<title id="title">Standard read versus FWFT read timing</title>
<desc id="desc">Side-by-side teaching waveform comparing standard synchronous-read FIFO timing with first-word-fall-through timing.</desc>
<defs>
<style>
.bg{fill:#0b1020}.panel{fill:#0f172a;stroke:#263244;stroke-width:1}.grid{stroke:#243044;stroke-width:1}.axis{stroke:#526179;stroke-width:1}.label{font-family:monospace;font-size:13px;fill:#e5edf7}.small{font-family:monospace;font-size:11px;fill:#b7c4d8}.note{font-family:Arial,sans-serif;font-size:13px;fill:#d7e1f0}.title{font-family:Arial,sans-serif;font-size:15px;font-weight:700;fill:#f8fafc}.bus{fill:#102a1f;stroke:#22c55e;stroke-width:1.4}.tag{fill:#182133;stroke:#46556f;stroke-width:1}.tagtext{font-family:monospace;font-size:11px;fill:#dbeafe}.arrow{stroke:#94a3b8;stroke-width:1.4;marker-end:url(#arrowhead)}
</style>
<marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
<path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
</marker>
</defs>
<rect class="bg" width="980" height="470"/>
<text class="note" x="116" y="24">Teaching timing sketch: both modes use the same async FIFO core; FWFT adds read-side prefetch/output storage.</text>

<rect class="panel" x="18" y="42" width="944" height="190" rx="6"/>
<text class="title" x="34" y="66">Standard synchronous read: request first, then sample rd_valid</text>
<rect class="panel" x="18" y="252" width="944" height="190" rx="6"/>
<text class="title" x="34" y="276">FWFT / fallthrough read: data appears first, rd_en consumes it</text>

<g id="standard">
<line class="grid" x1="120" y1="86" x2="940" y2="86"/>
<line class="grid" x1="120" y1="124" x2="940" y2="124"/>
<line class="grid" x1="120" y1="162" x2="940" y2="162"/>
<line class="grid" x1="120" y1="200" x2="940" y2="200"/>
<text class="label" x="34" y="91">empty</text>
<text class="label" x="34" y="129">rd_en</text>
<text class="label" x="34" y="167">rd_valid</text>
<text class="label" x="34" y="205">rd_data</text>
<line class="axis" x1="120" y1="76" x2="120" y2="214"/>
<line class="axis" x1="300" y1="76" x2="300" y2="214"/>
<line class="axis" x1="480" y1="76" x2="480" y2="214"/>
<line class="axis" x1="660" y1="76" x2="660" y2="214"/>
<line class="axis" x1="840" y1="76" x2="840" y2="214"/>
<text class="small" x="120" y="226" text-anchor="middle">t0</text>
<text class="small" x="300" y="226" text-anchor="middle">write seen</text>
<text class="small" x="480" y="226" text-anchor="middle">read request</text>
<text class="small" x="660" y="226" text-anchor="middle">data valid</text>
<path d="M120 78 L300 78 L300 100 L940 100" fill="none" stroke="#f59e0b" stroke-width="2.1"/>
<path d="M120 136 L480 136 L480 114 L570 114 L570 136 L940 136" fill="none" stroke="#34d399" stroke-width="2.1"/>
<path d="M120 174 L660 174 L660 152 L750 152 L750 174 L940 174" fill="none" stroke="#14b8a6" stroke-width="2.1"/>
<rect class="bus" x="120" y="185" width="540" height="24"/>
<text class="small" x="390" y="201" text-anchor="middle">x / old</text>
<rect class="bus" x="660" y="185" width="280" height="24"/>
<text class="small" x="800" y="201" text-anchor="middle">A0</text>
<line class="arrow" x1="488" y1="116" x2="650" y2="154"/>
<rect class="tag" x="408" y="72" width="146" height="18" rx="4"/>
<text class="tagtext" x="481" y="85" text-anchor="middle">rd_en starts fetch</text>
<rect class="tag" x="598" y="140" width="126" height="18" rx="4"/>
<text class="tagtext" x="661" y="153" text-anchor="middle">sample A0 here</text>
</g>

<g id="fwft">
<line class="grid" x1="120" y1="296" x2="940" y2="296"/>
<line class="grid" x1="120" y1="334" x2="940" y2="334"/>
<line class="grid" x1="120" y1="372" x2="940" y2="372"/>
<line class="grid" x1="120" y1="410" x2="940" y2="410"/>
<text class="label" x="34" y="301">empty</text>
<text class="label" x="34" y="339">rd_en</text>
<text class="label" x="34" y="377">rd_valid</text>
<text class="label" x="34" y="415">rd_data</text>
<line class="axis" x1="120" y1="286" x2="120" y2="424"/>
<line class="axis" x1="300" y1="286" x2="300" y2="424"/>
<line class="axis" x1="480" y1="286" x2="480" y2="424"/>
<line class="axis" x1="660" y1="286" x2="660" y2="424"/>
<line class="axis" x1="840" y1="286" x2="840" y2="424"/>
<text class="small" x="120" y="436" text-anchor="middle">t0</text>
<text class="small" x="300" y="436" text-anchor="middle">write seen</text>
<text class="small" x="480" y="436" text-anchor="middle">prefetch done</text>
<text class="small" x="660" y="436" text-anchor="middle">consume</text>
<text class="small" x="840" y="436" text-anchor="middle">next visible</text>
<path d="M120 288 L480 288 L480 310 L660 310 L660 288 L840 288 L840 310 L940 310" fill="none" stroke="#f59e0b" stroke-width="2.1"/>
<path d="M120 346 L660 346 L660 324 L750 324 L750 346 L940 346" fill="none" stroke="#34d399" stroke-width="2.1"/>
<path d="M120 384 L480 384 L480 362 L660 362 L660 384 L840 384 L840 362 L940 362" fill="none" stroke="#14b8a6" stroke-width="2.1"/>
<rect class="bus" x="120" y="395" width="360" height="24"/>
<text class="small" x="300" y="411" text-anchor="middle">x / old</text>
<rect class="bus" x="480" y="395" width="180" height="24"/>
<text class="small" x="570" y="411" text-anchor="middle">A0 stable</text>
<rect class="bus" x="660" y="395" width="180" height="24"/>
<text class="small" x="750" y="411" text-anchor="middle">A0 pop</text>
<rect class="bus" x="840" y="395" width="100" height="24"/>
<text class="small" x="890" y="411" text-anchor="middle">A1</text>
<line class="arrow" x1="490" y1="364" x2="490" y2="397"/>
<rect class="tag" x="400" y="350" width="160" height="18" rx="4"/>
<text class="tagtext" x="480" y="363" text-anchor="middle">first word visible</text>
<rect class="tag" x="602" y="312" width="116" height="18" rx="4"/>
<text class="tagtext" x="660" y="325" text-anchor="middle">rd_en pops</text>
</g>
</svg>
